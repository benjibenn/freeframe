# Authentik reverse proxy (TLS) — deb-sso.debugged.com.my -> 127.0.0.1:9000
# Cloudflare connects to origin :443 (Full SSL mode); this vhost serves the LE
# cert and proxies to Authentik. Required: ssl proxy proxy_http proxy_wstunnel
# rewrite headers.
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName deb-sso.debugged.com.my

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto expr=%{REQUEST_SCHEME}

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:9000/$1 [P,L]
    RewriteCond %{HTTP:Upgrade} !=websocket [NC]
    RewriteRule /(.*) http://127.0.0.1:9000/$1 [P,L]

    ProxyPassReverse / http://127.0.0.1:9000/

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/deb-sso.debugged.com.my/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/deb-sso.debugged.com.my/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ErrorLog ${APACHE_LOG_DIR}/deb-sso-error.log
    CustomLog ${APACHE_LOG_DIR}/deb-sso-access.log combined
</VirtualHost>
</IfModule>
