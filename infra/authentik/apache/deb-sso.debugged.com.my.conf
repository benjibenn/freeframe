# Authentik reverse proxy — deb-sso.debugged.com.my -> 127.0.0.1:9000
# :80 serves ACME challenges from a local webroot (so certbot works even with
# the catch-all proxy) and proxies everything else to Authentik.
# certbot writes the matching *-le-ssl.conf (:443) with the cert.
#
# Required modules: proxy proxy_http proxy_wstunnel rewrite headers ssl

<VirtualHost *:80>
    ServerName deb-sso.debugged.com.my

    # ACME HTTP-01 challenge — served locally, NOT proxied to Authentik
    Alias /.well-known/acme-challenge /var/www/acme/.well-known/acme-challenge
    <Directory /var/www/acme/.well-known/acme-challenge>
        Require all granted
    </Directory>

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto expr=%{REQUEST_SCHEME}

    RewriteEngine On
    # Let ACME challenges fall through to the Alias above
    RewriteRule ^/\.well-known/acme-challenge/ - [L]
    # WebSocket upgrades -> ws://
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:9000/$1 [P,L]
    # Everything else -> http://
    RewriteCond %{HTTP:Upgrade} !=websocket [NC]
    RewriteRule /(.*) http://127.0.0.1:9000/$1 [P,L]

    ProxyPassReverse / http://127.0.0.1:9000/

    ErrorLog ${APACHE_LOG_DIR}/deb-sso-error.log
    CustomLog ${APACHE_LOG_DIR}/deb-sso-access.log combined
</VirtualHost>
