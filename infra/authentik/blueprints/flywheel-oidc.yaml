# ============================================================
# Creative Flywheel — OIDC application registrations
# ============================================================
# Declarative registration of all four apps as OIDC clients in Authentik.
# This is the version-controlled "list of apps + redirect URIs". The actual
# domain/secret VALUES come from .env.authentik (read via !Env), so you edit
# domains in ONE place (.env.authentik) and re-apply this blueprint.
#
# Targets Authentik 2024.2+ schema (structured redirect_uris with matching_mode).
# Auto-discovered from /blueprints/custom; apply status shows in
# Admin → Customize → Blueprints. See README.md for validation.
# ============================================================
version: 1
metadata:
  name: flywheel-oidc-apps
  labels:
    blueprints.goauthentik.io/description: "Creative Flywheel OIDC clients (freeframe, CF, UploadUnicorn, adstash)"

entries:
  # ---------- freeframe ----------
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: freeframe
    attrs:
      client_type: confidential
      client_id: !Env FREEFRAME_OIDC_CLIENT_ID
      client_secret: !Env FREEFRAME_OIDC_CLIENT_SECRET
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      redirect_uris:
        - matching_mode: strict
          url: !Env FREEFRAME_OIDC_REDIRECT_URI
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
  - model: authentik_core.application
    state: present
    identifiers:
      slug: freeframe
    attrs:
      name: FreeFrame
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, freeframe]]
      meta_launch_url: !Env FREEFRAME_URL
      meta_description: "Review & approval (04/05 Evaluation)"

  # ---------- creative-flywheel ----------
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: creative-flywheel
    attrs:
      client_type: confidential
      client_id: !Env CF_OIDC_CLIENT_ID
      client_secret: !Env CF_OIDC_CLIENT_SECRET
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      redirect_uris:
        - matching_mode: strict
          url: !Env CF_OIDC_REDIRECT_URI
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
  - model: authentik_core.application
    state: present
    identifiers:
      slug: creative-flywheel
    attrs:
      name: Creative Flywheel
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, creative-flywheel]]
      meta_launch_url: !Env CF_URL
      meta_description: "Research / Ideation / Briefing (01-03)"

  # ---------- UploadUnicorn ----------
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: uploadunicorn
    attrs:
      client_type: confidential
      client_id: !Env UU_OIDC_CLIENT_ID
      client_secret: !Env UU_OIDC_CLIENT_SECRET
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      redirect_uris:
        - matching_mode: strict
          url: !Env UU_OIDC_REDIRECT_URI
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
  - model: authentik_core.application
    state: present
    identifiers:
      slug: uploadunicorn
    attrs:
      name: UploadUnicorn
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, uploadunicorn]]
      meta_launch_url: !Env UU_URL
      meta_description: "Content / asset storage (04)"

  # ---------- adstash ----------
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: adstash
    attrs:
      client_type: confidential
      client_id: !Env ADSTASH_OIDC_CLIENT_ID
      client_secret: !Env ADSTASH_OIDC_CLIENT_SECRET
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      redirect_uris:
        - matching_mode: strict
          url: !Env ADSTASH_OIDC_REDIRECT_URI
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
  - model: authentik_core.application
    state: present
    identifiers:
      slug: adstash
    attrs:
      name: adstash
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, adstash]]
      meta_launch_url: !Env ADSTASH_URL
      meta_description: "Launch & analysis (06/07)"

  # ---------- portal service account (Phase ② Shell) ----------
  # freeframe's /portal/apps endpoint authenticates to Authentik with this token
  # to read each user's launchable apps via ?for_user=. That query is only
  # honored for a superuser, so svc-portal is a member of "authentik Admins".
  # The token VALUE comes from .env.authentik (PORTAL_SERVICE_TOKEN), kept out of
  # git, and must match AUTHENTIK_SERVICE_TOKEN in freeframe's env.
  - model: authentik_core.user
    state: present
    identifiers:
      username: svc-portal
    attrs:
      name: "Portal Service Account"
      type: service_account
      path: goauthentik.io/service-accounts
      groups:
        - !Find [authentik_core.group, [name, "authentik Admins"]]
  - model: authentik_core.token
    state: present
    identifiers:
      identifier: svc-portal-token
    attrs:
      user: !Find [authentik_core.user, [username, svc-portal]]
      intent: api
      expiring: false
      key: !Env PORTAL_SERVICE_TOKEN
